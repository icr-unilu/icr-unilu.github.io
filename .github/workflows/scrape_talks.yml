name: Scrape Talk Locations

on:
  push:
    paths:
      - 'talks/**'
      - '_talks/**'
      - 'talkmap.ipynb'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for safe force-with-lease

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter pandas requests beautifulsoup4 geopy getorg --upgrade

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap_out.ipynb talkmap/org-locations.js
        if git diff --cached --quiet; then
          echo "No changes"
          exit 0
        fi
        git commit -m "Automated update of talk locations"
        git push --force \
          https://x-access-token:${{ secrets.DEPLOYMENT_TOKEN }}@github.com/icr-unilu/icr-unilu.github.io \
          HEAD:master